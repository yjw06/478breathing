<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>378 호흡</title>
  <style>
    :root { --bg:#05070a; --fg:#7d8794; --fg-dim:#3a414c; --accent:#5a6b82; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
      font-family:-apple-system,system-ui,sans-serif; overflow:hidden; }
    body { display:flex; align-items:center; justify-content:center; }
    .screen { display:none; width:100%; max-width:560px; padding:32px; text-align:center; }
    .screen.active { display:block; }
    h1 { font-weight:300; letter-spacing:.3em; font-size:20px; color:var(--accent); margin:0 0 40px; }
    .field { display:flex; align-items:center; justify-content:space-between;
      font-size:20px; padding:14px 4px; }
    .field input { width:90px; font-size:24px; text-align:center; background:#0d1016;
      color:var(--fg); border:1px solid #1c2230; border-radius:12px; padding:12px; }
    #start-btn { margin-top:40px; width:100%; padding:22px; font-size:22px; letter-spacing:.2em;
      background:#10141c; color:var(--accent); border:1px solid #1c2230; border-radius:18px; }
    #notice { margin-top:24px; font-size:13px; color:var(--fg-dim); line-height:1.6; }
    #phase-label { font-size:34px; font-weight:300; color:var(--fg); letter-spacing:.2em;
      opacity:.55; transition:opacity .6s; }
    #cycle-dots { margin-top:28px; font-size:20px; color:var(--fg-dim); letter-spacing:.4em; }
  </style>
</head>
<body>
  <main id="start-screen" class="screen active">
    <h1>378 호흡</h1>
    <label class="field">들숨 (초) <input id="inhale" type="number" min="1" max="20" inputmode="numeric"></label>
    <label class="field">멈춤 (초) <input id="hold" type="number" min="0" max="30" inputmode="numeric"></label>
    <label class="field">날숨 (초) <input id="exhale" type="number" min="1" max="30" inputmode="numeric"></label>
    <label class="field">반복 (회) <input id="cycles" type="number" min="1" max="20" inputmode="numeric"></label>
    <button id="start-btn">시작</button>
    <p id="notice">세션 중 화면이 꺼지면 소리가 멈춥니다.<br>설정 › 디스플레이 › 자동 잠금을 길게 두세요.</p>
  </main>

  <main id="session-screen" class="screen">
    <div id="phase-label">준비</div>
    <div id="cycle-dots"></div>
  </main>

  <script>
    "use strict";

    const DEFAULTS = { inhale:4, hold:7, exhale:8, cycles:4 };
    const KEY = "breath378.settings";

    function clampSettings(s) {
      const n = (v, min, max, def) => {
        const x = Math.round(Number(v));
        return Number.isFinite(x) ? Math.min(max, Math.max(min, x)) : def;
      };
      return {
        inhale: n(s.inhale, 1, 20, DEFAULTS.inhale),
        hold:   n(s.hold,   0, 30, DEFAULTS.hold),
        exhale: n(s.exhale, 1, 30, DEFAULTS.exhale),
        cycles: n(s.cycles, 1, 20, DEFAULTS.cycles),
      };
    }

    function loadSettings() {
      try { return clampSettings(JSON.parse(localStorage.getItem(KEY)) || {}); }
      catch { return { ...DEFAULTS }; }
    }
    function saveSettings(s) { localStorage.setItem(KEY, JSON.stringify(clampSettings(s))); }

    const $ = (id) => document.getElementById(id);
    function readInputs() {
      return clampSettings({
        inhale: $("inhale").value, hold: $("hold").value,
        exhale: $("exhale").value, cycles: $("cycles").value,
      });
    }
    function fillInputs(s) {
      $("inhale").value = s.inhale; $("hold").value = s.hold;
      $("exhale").value = s.exhale; $("cycles").value = s.cycles;
    }

    fillInputs(loadSettings());
    ["inhale","hold","exhale","cycles"].forEach((id) =>
      $(id).addEventListener("change", () => { const s = readInputs(); fillInputs(s); saveSettings(s); })
    );

    function buildSchedule(s) {
      const steps = [{ phase:"prep", label:"준비", durationMs:3000, cycleIndex:0 }];
      for (let c = 0; c < s.cycles; c++) {
        steps.push({ phase:"inhale", label:"들이쉬기", durationMs:s.inhale*1000, cycleIndex:c });
        if (s.hold > 0) steps.push({ phase:"hold", label:"멈추기", durationMs:s.hold*1000, cycleIndex:c });
        steps.push({ phase:"exhale", label:"내쉬기", durationMs:s.exhale*1000, cycleIndex:c });
      }
      steps.push({ phase:"done", label:"완료", durationMs:0, cycleIndex:s.cycles });
      return steps;
    }

    const VOICE_LINES = { prep:"준비하세요", inhale:"들이쉬세요", hold:"멈추세요",
      exhale:"내쉬세요", done:"다 됐어요. 편히 주무세요" };
    let koVoice = null;
    function pickKoreanVoice() {
      const vs = speechSynthesis.getVoices();
      koVoice = vs.find(v => v.lang && v.lang.toLowerCase().startsWith("ko")) || null;
    }
    if ("speechSynthesis" in window) {
      pickKoreanVoice();
      speechSynthesis.onvoiceschanged = pickKoreanVoice;
    }
    function speak(text) {
      if (!("speechSynthesis" in window)) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ko-KR"; if (koVoice) u.voice = koVoice;
      u.rate = 0.92; u.pitch = 1.0;
      speechSynthesis.speak(u);
    }

    function showSession() { $("start-screen").classList.remove("active"); $("session-screen").classList.add("active"); }
    function showStart()   { $("session-screen").classList.remove("active"); $("start-screen").classList.add("active"); }

    function renderPhase(step, schedule) {
      $("phase-label").textContent = step.label;
      const total = schedule[schedule.length-1].cycleIndex;
      const done = step.phase === "done" ? total : step.cycleIndex;
      $("cycle-dots").textContent = "●".repeat(done) + "○".repeat(Math.max(0, total - done));
      if (VOICE_LINES[step.phase]) speak(VOICE_LINES[step.phase]);
    }

    function runSession(schedule, onPhase, onDone) {
      let i = 0, timer = null, stopped = false;
      function next() {
        if (stopped) return;
        if (i >= schedule.length) { onDone(); return; }
        const step = schedule[i++];
        onPhase(step, schedule);
        if (step.phase === "done") { onDone(); return; }
        const dueAt = performance.now() + step.durationMs;
        (function tick() {
          if (stopped) return;
          const remaining = dueAt - performance.now();
          if (remaining <= 0) next();
          else timer = setTimeout(tick, Math.min(remaining, 200));
        })();
      }
      next();
      return function stop() { stopped = true; if (timer) clearTimeout(timer); };
    }

    let stopCurrent = null;
    function startSession() {
      const s = readInputs(); saveSettings(s);
      showSession();
      const schedule = buildSchedule(s);
      stopCurrent = runSession(schedule, renderPhase, endSession);
    }
    function endSession() {
      if (stopCurrent) { stopCurrent(); stopCurrent = null; }
      showStart();
    }

    $("start-btn").addEventListener("click", startSession);
    $("session-screen").addEventListener("click", endSession);
  </script>
</body>
</html>
