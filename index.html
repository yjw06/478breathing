<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="478 호흡" />
  <meta name="theme-color" content="#05070a" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-180.png" />
  <link rel="icon" type="image/png" href="./icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
  <title>478 호흡</title>
</head>
<body>
  <div class="app">
    <!-- 좌측: 설정/메인 -->
    <section id="controls">
      <div class="brand">
        <h1>478 호흡</h1>
        <p class="subtitle">4 · 7 · 8 BREATHING</p>
      </div>

      <div class="presets" role="group" aria-label="프리셋">
        <button class="preset" type="button" data-i="4" data-h="7" data-e="8">수면 4·7·8</button>
        <button class="preset" type="button" data-i="4" data-h="4" data-e="4">균형 4·4·4</button>
        <button class="preset" type="button" data-i="6" data-h="0" data-e="8">이완 6·0·8</button>
      </div>

      <div class="settings" id="settings"></div>

      <button id="go-btn" type="button">시작</button>
    </section>

    <!-- 우측: 호흡 안내 -->
    <section id="stage" aria-label="호흡 안내">
      <div id="breath-stage">
        <div id="breath-circle" aria-hidden="true"></div>
        <div id="phase-count" aria-hidden="true"></div>
      </div>
      <div id="phase-label" aria-live="polite">준비</div>
      <div id="time-left" aria-live="off"></div>
    </section>
  </div>

  <script>
    "use strict";

    const DEFAULTS = { inhale:4, hold:7, exhale:8, minutes:5 };
    const KEY = "breath478.settings";
    const FIELDS = [
      { key:"inhale",  name:"들숨",  unit:"초", min:1, max:20 },
      { key:"hold",    name:"멈춤",  unit:"초", min:0, max:30 },
      { key:"exhale",  name:"날숨",  unit:"초", min:1, max:30 },
      { key:"minutes", name:"시간",  unit:"분", min:1, max:60 },
    ];
    const BOUNDS = Object.fromEntries(FIELDS.map(f => [f.key, [f.min, f.max]]));

    function clampSettings(s) {
      const n = (v, [min, max], def) => {
        const x = Math.round(Number(v));
        return Number.isFinite(x) ? Math.min(max, Math.max(min, x)) : def;
      };
      return {
        inhale:  n(s.inhale,  BOUNDS.inhale,  DEFAULTS.inhale),
        hold:    n(s.hold,    BOUNDS.hold,    DEFAULTS.hold),
        exhale:  n(s.exhale,  BOUNDS.exhale,  DEFAULTS.exhale),
        minutes: n(s.minutes, BOUNDS.minutes, DEFAULTS.minutes),
      };
    }
    function loadSettings() {
      try { return clampSettings(JSON.parse(localStorage.getItem(KEY)) || {}); }
      catch { return { ...DEFAULTS }; }
    }
    function saveSettings(s) { try { localStorage.setItem(KEY, JSON.stringify(clampSettings(s))); } catch {} }

    const $ = (id) => document.getElementById(id);
    let settings = loadSettings();

    /* ── 설정 UI (스텝퍼) ── */
    function buildSettingsUI() {
      $("settings").innerHTML = FIELDS.map((f) => `
        <div class="row">
          <span class="name">${f.name}</span>
          <div class="stepper">
            <button class="step-btn" type="button" data-key="${f.key}" data-act="-1" aria-label="${f.name} 줄이기">−</button>
            <span class="step-val" id="v-${f.key}">${settings[f.key]}</span>
            <button class="step-btn" type="button" data-key="${f.key}" data-act="1" aria-label="${f.name} 늘리기">+</button>
            <span class="step-unit">${f.unit}</span>
          </div>
        </div>`).join("");
    }
    function renderSettings() {
      FIELDS.forEach((f) => { $("v-" + f.key).textContent = settings[f.key]; });
      // 프리셋 활성화 표시 (들숨/멈춤/날숨 일치 시)
      document.querySelectorAll(".preset").forEach((b) => {
        const on = +b.dataset.i === settings.inhale && +b.dataset.h === settings.hold && +b.dataset.e === settings.exhale;
        b.setAttribute("aria-pressed", on ? "true" : "false");
      });
      if (!running) showIdle();
    }
    function adjust(key, delta) {
      const [min, max] = BOUNDS[key];
      settings[key] = Math.min(max, Math.max(min, settings[key] + delta));
      saveSettings(settings);
      renderSettings();
    }

    $("settings").addEventListener("click", (e) => {
      const btn = e.target.closest(".step-btn");
      if (btn) adjust(btn.dataset.key, +btn.dataset.act);
    });
    document.querySelectorAll(".preset").forEach((b) =>
      b.addEventListener("click", () => {
        settings.inhale = +b.dataset.i; settings.hold = +b.dataset.h; settings.exhale = +b.dataset.e;
        saveSettings(settings); renderSettings();
      })
    );

    /* ── 스케줄 ── */
    function buildSchedule(s) {
      const cycleSec = s.inhale + s.hold + s.exhale;
      const cycles = Math.max(1, Math.round(s.minutes * 60 / cycleSec));
      const steps = [{ phase:"prep", label:"준비", durationMs:3000 }];
      for (let c = 0; c < cycles; c++) {
        steps.push({ phase:"inhale", label:"들이쉬기", durationMs:s.inhale*1000 });
        if (s.hold > 0) steps.push({ phase:"hold", label:"멈추기", durationMs:s.hold*1000 });
        steps.push({ phase:"exhale", label:"내쉬기", durationMs:s.exhale*1000 });
      }
      steps.push({ phase:"done", label:"완료", durationMs:0 });
      return steps;
    }
    function estTotalMs(s) { return buildSchedule(s).reduce((sum, st) => sum + st.durationMs, 0); }

    /* ── 오디오: 브라운 노이즈 배경 ── */
    let audioCtx = null, noiseNode = null, noiseGain = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      return audioCtx;
    }
    function startNoise() {
      const ctx = getAudioCtx();
      const bufferSize = 2 * ctx.sampleRate;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      let last = 0;
      for (let i = 0; i < bufferSize; i++) {
        const white = Math.random() * 2 - 1;
        last = (last + 0.02 * white) / 1.02; data[i] = last * 3.5;
      }
      noiseNode = ctx.createBufferSource(); noiseNode.buffer = buffer; noiseNode.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 500;
      noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0, ctx.currentTime);
      noiseGain.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 1.5);
      noiseNode.connect(lp).connect(noiseGain).connect(ctx.destination);
      noiseNode.start();
    }
    function stopNoise() {
      if (!noiseNode || !audioCtx) return;
      const t = audioCtx.currentTime;
      noiseGain.gain.cancelScheduledValues(t);
      noiseGain.gain.setValueAtTime(noiseGain.gain.value, t);
      noiseGain.gain.linearRampToValueAtTime(0, t + 1);
      const n = noiseNode; setTimeout(() => { try { n.stop(); } catch {} }, 1100);
      noiseNode = null;
    }

    /* ── 단계 전환음 (부드러운 사인 글라이드) ── */
    function tone(freqStart, freqEnd, dur, peak = 0.08) {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const g = ctx.createGain();
      osc.type = "sine";
      const t = ctx.currentTime;
      osc.frequency.setValueAtTime(freqStart, t);
      if (freqEnd !== freqStart) osc.frequency.linearRampToValueAtTime(freqEnd, t + dur);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(peak, t + Math.min(0.18, dur * 0.35));
      g.gain.linearRampToValueAtTime(0.0001, t + dur);
      osc.connect(g).connect(ctx.destination);
      osc.start(t); osc.stop(t + dur + 0.05);
    }
    const PHASE_TONES = {
      prep:   () => tone(330, 330, 0.6, 0.06),
      inhale: () => tone(294, 392, 0.7),
      hold:   () => tone(392, 392, 0.4, 0.045),
      exhale: () => tone(392, 262, 0.9),
    };
    function doneTone() {
      tone(392, 330, 0.8, 0.06);
      setTimeout(() => tone(330, 262, 1.2, 0.06), 480);
    }

    /* ── 호흡 가이드 원 ── */
    const BREATH_MIN = 0.58, BREATH_MAX = 1.0, BREATH_MID = 0.8, BREATH_IDLE = 0.72;
    const BREATH_TARGET = { inhale:BREATH_MAX, hold:BREATH_MAX, exhale:BREATH_MIN, prep:BREATH_MID, done:BREATH_MID };
    function setBreathVisual(step) {
      const c = $("breath-circle");
      const target = BREATH_TARGET[step.phase];
      if (target == null) return;
      const dur = step.phase === "hold" ? 200
        : step.phase === "prep" ? 1000
        : step.phase === "done" ? 1200
        : step.durationMs;
      c.style.transitionDuration = dur + "ms";
      void c.offsetWidth;
      c.style.transform = "scale(" + target + ")";
    }
    function setBreathIdle() {
      const c = $("breath-circle");
      c.style.transitionDuration = "0ms";
      c.style.transform = "scale(" + BREATH_IDLE + ")";
      void c.offsetWidth;
    }

    /* ── 단계 내 카운트 (1·2·3…) ── */
    let phaseTimer = null;
    function startPhaseCount(step) {
      stopPhaseCount();
      const el = $("phase-count");
      const total = Math.round(step.durationMs / 1000);
      const counted = step.phase === "inhale" || step.phase === "hold" || step.phase === "exhale";
      if (!counted || total < 1) { el.textContent = ""; return; }
      let n = 1; el.textContent = n;
      phaseTimer = setInterval(() => {
        n++; if (n > total) { stopPhaseCount(); return; } el.textContent = n;
      }, 1000);
    }
    function stopPhaseCount() { if (phaseTimer) { clearInterval(phaseTimer); phaseTimer = null; } }

    function renderPhase(step) {
      $("phase-label").textContent = step.label;
      setBreathVisual(step);
      startPhaseCount(step);
      if (step.phase === "done") doneTone();
      else if (PHASE_TONES[step.phase]) PHASE_TONES[step.phase]();
    }

    /* ── 남은 시간 ── */
    function fmtTime(ms) {
      const s = Math.max(0, Math.ceil(ms / 1000));
      return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
    }
    let countdownTimer = null;
    function startCountdown(schedule) {
      const totalMs = schedule.reduce((sum, st) => sum + st.durationMs, 0);
      const endAt = performance.now() + totalMs;
      const el = $("time-left");
      el.textContent = fmtTime(totalMs);
      countdownTimer = setInterval(() => {
        const remaining = endAt - performance.now();
        el.textContent = fmtTime(remaining);
        if (remaining <= 0) stopCountdown();
      }, 250);
    }
    function stopCountdown() { if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; } }

    /* ── 화면 꺼짐 방지 (Wake Lock) ── */
    let wakeLock = null;
    async function requestWakeLock() {
      try { if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); } catch {}
    }
    function releaseWakeLock() { try { if (wakeLock) wakeLock.release(); } catch {} wakeLock = null; }
    document.addEventListener("visibilitychange", () => {
      if (running && document.visibilityState === "visible" && !wakeLock) requestWakeLock();
    });

    /* ── 세션 실행 ── */
    function runSession(schedule, onPhase, onDone) {
      let i = 0, timer = null, stopped = false;
      function next() {
        if (stopped) return;
        if (i >= schedule.length) { onDone(); return; }
        const step = schedule[i++];
        onPhase(step);
        if (step.phase === "done") { onDone(); return; }
        const dueAt = performance.now() + step.durationMs;
        (function tick() {
          if (stopped) return;
          const remaining = dueAt - performance.now();
          if (remaining <= 0) next();
          else timer = setTimeout(tick, Math.min(remaining, 200));
        })();
      }
      next();
      return function stop() { stopped = true; if (timer) clearTimeout(timer); };
    }

    let running = false, stopCurrent = null;

    function showIdle() {
      $("phase-label").textContent = "준비";
      $("phase-count").textContent = "";
      $("time-left").textContent = "≈ " + fmtTime(estTotalMs(settings));
      setBreathIdle();
    }

    function startSession() {
      running = true;
      document.body.classList.add("running");
      $("go-btn").textContent = "정지";
      requestWakeLock();
      startNoise();
      setBreathIdle();
      const schedule = buildSchedule(settings);
      startCountdown(schedule);
      stopCurrent = runSession(schedule, renderPhase, completeSession);
    }
    function teardown() {
      stopCountdown(); stopPhaseCount(); stopNoise(); releaseWakeLock();
      if (stopCurrent) { stopCurrent(); stopCurrent = null; }
      document.body.classList.remove("running");
      $("go-btn").textContent = "시작";
      running = false;
    }
    function stopSession() { teardown(); showIdle(); }          // 사용자가 정지
    function completeSession() {                                 // 자연 종료 (완료 표시 유지)
      teardown();
      $("time-left").textContent = "";
      setTimeout(() => { if (!running) showIdle(); }, 4000);
    }

    $("go-btn").addEventListener("click", () => { running ? stopSession() : startSession(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape" && running) stopSession(); });

    /* ── 초기화 ── */
    buildSettingsUI();
    renderSettings();   // showIdle 포함

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js").catch(() => {}); });
    }
  </script>
</body>
</html>
